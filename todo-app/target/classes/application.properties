spring.application.name=todo-app
server.port=8080
logging.level.com.learnjava.todo=DEBUG

# Cache logging — shows cache hits/misses/evictions in the log at TRACE level.
# Useful for diagnosing cache behaviour during development.
# Turn OFF in production (very verbose).
logging.level.org.springframework.cache=TRACE

# ================================================================
# DATASOURCE — H2 in-memory database
# ================================================================

# JDBC URL for H2.
# MODE=PostgreSQL tells H2 to behave like PostgreSQL where possible —
# so when we later switch to real PostgreSQL, SQL behaviour is consistent.
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ================================================================
# JPA / HIBERNATE
# ================================================================

# Hibernate dialect tells Hibernate which SQL "flavour" to generate.
# H2Dialect generates SQL compatible with H2's engine.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# DDL auto — controls how Hibernate manages the schema on startup:
#   create-drop : creates tables on start, drops on shutdown (used for H2 in dev/test)
#   none        : do nothing — Flyway is fully responsible for schema (PostgreSQL profiles)
#   validate    : validate schema matches entities, fail if not (strictest production mode)
# H2 profile uses 'create-drop' so Flyway runs against a clean slate each time.
# This is intentional for the default/test profile — no persistent state.
spring.jpa.hibernate.ddl-auto=create-drop

# Prints every SQL statement Hibernate executes to the log.
# Invaluable for learning — you see exactly what SQL JPA generates.
# Turn this OFF in production (too verbose, exposes query structure).
spring.jpa.show-sql=true

# Formats the printed SQL across multiple lines — readable instead of one long line.
spring.jpa.properties.hibernate.format_sql=true

# ================================================================
# H2 CONSOLE — browser-based SQL explorer
# ================================================================

# Enables the H2 web console at http://localhost:8080/h2-console
# You can run SQL queries, inspect tables, and see live data.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ================================================================
# FLYWAY — database migration
# ================================================================

# Flyway is enabled in all profiles by default. For H2 (this profile) it will
# create the tables via V1/V2 scripts, which is redundant since ddl-auto=create-drop
# also creates them. We let Flyway run anyway so test behaviour matches prod behaviour.
# The key difference: H2 is in-memory, so flyway_schema_history is discarded on shutdown.
spring.flyway.enabled=true

# Tell Flyway that the H2 datasource is a clean slate each restart.
# baseline-on-migrate: false (default) — Flyway expects a fresh empty schema.
# No baseline needed here because H2 is wiped clean by create-drop each run.

# Remove data.sql initialization — seed data is now in V3__seed_todos.sql (Flyway).
# data.sql is deleted; this property is no longer needed.
# spring.jpa.defer-datasource-initialization=true  ← removed

# ================================================================
# SPRINGDOC / SWAGGER UI
# ================================================================

# Path where Swagger UI is served (browser-friendly URL)
springdoc.swagger-ui.path=/swagger-ui.html

# Path where the raw OpenAPI JSON spec is served
springdoc.api-docs.path=/v3/api-docs

# Sort endpoints alphabetically in the UI (cleaner for large APIs)
springdoc.swagger-ui.operationsSorter=method

# Disable the "Try it out" default-expanded state — users click to expand
springdoc.swagger-ui.tryItOutEnabled=false

# Enable "Try it out" on auth endpoints so you can register/login directly from Swagger UI
# This allows you to get a token and then click the Authorize button to use it
springdoc.swagger-ui.persist-authorization=true

# ================================================================
# JWT CONFIGURATION
# ================================================================

# Secret key used to sign and verify JWT tokens (HMAC-SHA256).
# Must be at least 256 bits (32 characters). In production this must
# come from an environment variable or secrets manager — never hardcode.
jwt.secret=todo-app-super-secret-key-for-learning-phase-10-2024
# Access token validity: 900000 ms = 15 minutes (short-lived for security)
jwt.expiration=900000
# Refresh token validity: 604800000 ms = 7 days (long-lived, stored in Redis)
jwt.refresh-token-expiration=604800000

# ================================================================
# ACTUATOR — management endpoints
# ================================================================

# Which endpoints to expose over HTTP.
# '*' exposes all of them — we restrict access via SecurityConfig instead.
# In production you might list only: health,info,metrics
management.endpoints.web.exposure.include=health,info,metrics,loggers

# Base path for all actuator endpoints. Default is /actuator.
# Keeping the default is fine — it's well-known and expected.
management.endpoints.web.base-path=/actuator

# Show full health details (component breakdown) when the request is:
#   always     → show to everyone (useful for dev, risky for prod)
#   when_authorized → show details only to authenticated+authorized users
#   never      → never show details, only status UP/DOWN
# We use 'always' for learning — in production use 'when_authorized'.
management.endpoint.health.show-details=always

# Show individual health component breakdown (db, todo, diskSpace etc.)
management.endpoint.health.show-components=always

# ================================================================
# APP INFO — shown at GET /actuator/info
# ================================================================

# Static info properties — shown at /actuator/info.
# In a real CI/CD pipeline these come from maven filtering or build plugins.
info.app.name=Todo Application
info.app.description=Spring Boot learning project — Phase 20
info.app.version=0.20.0
info.app.java-version=21

# ================================================================
# CACHE — default profile uses Caffeine (in-process, no Redis needed)
# ================================================================

# Explicitly tell Spring Boot to use Caffeine for the cache abstraction
# in the default (H2/test) profile. This prevents Spring Boot from
# auto-detecting the Redis starter and trying to use Redis when no
# Redis server is running (tests, plain java -jar with no profile).
spring.cache.type=caffeine
