# Testcontainers configuration file.
# Placed in src/test/resources/ — picked up automatically by Testcontainers at startup.
#
# WHY THIS FILE IS NEEDED (Windows + Docker Desktop):
#   Testcontainers' auto-detection strategy calls 'docker info' to validate the Docker
#   environment. On Windows with Docker Desktop, the info endpoint occasionally returns
#   a partial response (empty ServerVersion, OSType, etc.) which Testcontainers rejects
#   as an invalid environment — even though Docker is fully functional.
#
#   Setting 'docker.client.strategy' to a specific strategy that uses the named pipe
#   directly — and disabling the info-validity check — tells Testcontainers to trust
#   the connection is valid if it can simply connect.
#
#   'ryuk.disabled=true': Ryuk is the Testcontainers resource reaper — a side-car
#   container that cleans up leftover containers if the JVM crashes mid-test.
#   On Windows with some Docker Desktop configurations, starting the Ryuk container
#   also triggers the same info-validation failure. Disabling it is safe for
#   development: containers are stopped by the JUnit 5 extension via @Container/@Testcontainers
#   at the end of each test class. Ryuk is only a safety net for JVM crashes.
docker.client.strategy=org.testcontainers.dockerclient.NpipeSocketClientProviderStrategy
ryuk.disabled=true
