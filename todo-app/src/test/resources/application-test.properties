# ================================================================
# application-test.properties
# Active when: @ActiveProfiles("test") on integration test classes
# Purpose: override settings that don't apply to the integration test environment
# ================================================================

# Flyway is enabled — integration tests run all 3 migrations against real PostgreSQL.
# This verifies our migration scripts actually work on PostgreSQL (not just H2).
spring.flyway.enabled=true

# 'none' — Flyway is fully in charge; Hibernate does NOT touch the schema.
# Matches production behaviour exactly.
spring.jpa.hibernate.ddl-auto=none

# PostgreSQL dialect — matches the real database Testcontainers provides.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Show SQL in test output — helpful for debugging test failures.
# You can see exactly what queries are issued against the real PostgreSQL.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 console — not used in integration tests
spring.h2.console.enabled=false

# JWT config required by JwtServiceImpl and RefreshTokenServiceImpl (@Value injection)
jwt.secret=test-secret-key-for-integration-tests-must-be-32chars
jwt.expiration=900000
jwt.refresh-token-expiration=604800000
