# ================================================================
# application-docker.properties
# Active when: SPRING_PROFILES_ACTIVE=docker
# Used by: the 'app' service in docker-compose.yml
# ================================================================
#
# HOW SPRING PROFILES WORK:
#   1. application.properties is ALWAYS loaded (the base config)
#   2. application-{profile}.properties is loaded ON TOP, overriding matching keys
#   3. Environment variables override everything (highest priority)
#
# So when running with docker profile:
#   - H2 datasource from application.properties is overridden by these PostgreSQL settings
#   - All other settings (server.port, jwt.*, springdoc.*) remain from application.properties

# ================================================================
# DATASOURCE — PostgreSQL
# ================================================================

# 'postgres' is the service name in docker-compose.yml.
# Docker's internal DNS resolves 'postgres' to the container's IP automatically.
# This ONLY works inside Docker network — for local dev (without Docker), use localhost:5432.
spring.datasource.url=jdbc:postgresql://postgres:5432/tododb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=todo_user
spring.datasource.password=todo_pass

# ================================================================
# JPA / HIBERNATE — PostgreSQL specific
# ================================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 'none' — Hibernate does NOT touch the schema at all.
# Flyway is fully responsible for creating and evolving the schema.
# Safe for production: no accidental column drops, no auto-guessing.
spring.jpa.hibernate.ddl-auto=none

# ================================================================
# FLYWAY — PostgreSQL migrations
# ================================================================

# Flyway is enabled (inherited from application.properties, already true).
# On first Docker run, Flyway will create flyway_schema_history and run V1, V2, V3.
# On subsequent restarts, Flyway sees all migrations already applied and does nothing.
spring.flyway.enabled=true

# ================================================================
# H2 CONSOLE — disable in Docker (PostgreSQL doesn't use H2 console)
# ================================================================
spring.h2.console.enabled=false

# ================================================================
# REDIS — docker profile connects to Redis container by service name
# ================================================================

# 'redis' is the service name in docker-compose.yml.
# Docker's internal DNS resolves 'redis' to the container's IP automatically.
# This ONLY works inside Docker network — for local dev (outside Docker), use localhost.
spring.data.redis.host=redis
spring.data.redis.port=6379

# Use Redis as the cache backend for this profile.
# Overrides spring.cache.type=caffeine from application.properties.
spring.cache.type=redis
