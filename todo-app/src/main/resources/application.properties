# ================================================
# APPLICATION CONFIGURATION
# ================================================

# The name of your application. Used in logging, Actuator, etc.
spring.application.name=todo-app

# ================================================
# SERVER CONFIGURATION
# ================================================

# The port the embedded Tomcat will listen on.
# 8080 is the Spring Boot default. We set it explicitly for clarity.
server.port=8080

# ================================================
# LOGGING CONFIGURATION
# ================================================

# Set the log level for our application package.
# DEBUG during development = we see everything our app does.
# In production, this would be INFO or WARN.
logging.level.com.learnjava.todo=DEBUG
