# ================================================================
# application-local.properties
# Active when: SPRING_PROFILES_ACTIVE=local
# Used when: running the app with 'mvn spring-boot:run' on your machine
#            while PostgreSQL is running in Docker
# ================================================================
#
# DIFFERENCE FROM application-docker.properties:
#   docker profile → datasource URL uses 'postgres' (Docker internal hostname)
#   local  profile → datasource URL uses 'localhost' (your machine's loopback)
#
# When you run 'docker compose up postgres -d', PostgreSQL binds to localhost:5432
# on your machine (via port mapping "5432:5432" in docker-compose.yml).
# The app running locally can reach it at localhost:5432.

spring.datasource.url=jdbc:postgresql://localhost:5432/tododb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=todo_user
spring.datasource.password=todo_pass

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console — not applicable for PostgreSQL
spring.h2.console.enabled=false
